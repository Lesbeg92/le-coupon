function renderStatsPage(){
  const done=state.matches.filter(m=>isPast(m)&&m.userA!=null&&m.userB!=null);
  done.forEach(generateIA);
  const mp=m=>pts(m.userA,m.userB,m.resA,m.resB)||0;
  const ip=m=>pts(m.iaA,m.iaB,m.resA,m.resB)||0;
  const sg=x=>x>0?1:(x<0?-1:0);
  const tot=totalPts(); const n=done.length;
  if(!n){document.getElementById('view').innerHTML=`<section class="panel"><h2 class="sectionTitle">Performance</h2><div class="event warn">Pas encore de match noté. Tes statistiques s'afficheront dès que des résultats seront enregistrés.</div></section>`;return}
  const avg=(tot/n).toFixed(1);
  const exact=done.filter(m=>mp(m)===10).length;
  const goodPct=Math.round(done.filter(m=>mp(m)>=5).length/n*100);
  const winPct=Math.round(done.filter(m=>sg(m.userA-m.userB)===sg(m.resA-m.resB)).length/n*100);
  const iaTot=done.reduce((s,m)=>s+ip(m),0);
  const ord=[...done].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let c1=0,c2=0; const sMe=ord.map(m=>{c1+=mp(m);return c1}); const sIA=ord.map(m=>{c2+=ip(m);return c2});
  const gmax=Math.max(...sMe,...sIA,1);
  const poly=(arr,col)=>{if(arr.length<2)return '';const W=280,H=60;const q=arr.map((v,i)=>((i/(arr.length-1))*W).toFixed(1)+','+(H-(v/gmax)*H).toFixed(1)).join(' ');return `<polyline fill="none" stroke="${col}" stroke-width="2.5" points="${q}"/>`};
  const spark=`<svg viewBox="0 0 280 60" preserveAspectRatio="none" style="width:100%;height:60px;display:block;margin:8px 0">${poly(sIA,'#9fb3c8')}${poly(sMe,'#34d399')}</svg>`;
  let best=done[0],worst=done[0]; done.forEach(m=>{if(mp(m)>mp(best))best=m; if(mp(m)<mp(worst))worst=m;});
  const buckets={haute:[],moyenne:[],basse:[]};
  done.forEach(m=>{const c=m.conf||0; buckets[c>=75?'haute':(c>=60?'moyenne':'basse')].push(m)});
  const calib=['haute','moyenne','basse'].map(b=>{const arr=buckets[b]; if(!arr.length)return null; const hit=Math.round(arr.filter(m=>sg(m.iaA-m.iaB)===sg(m.resA-m.resB)).length/arr.length*100); return `<div class="event ${hit>=60?'good':hit>=45?'warn':'bad'}">Confiance ${b}: bon vainqueur ${hit}% sur ${arr.length} match(s)</div>`}).filter(Boolean).join('')||'<div class="event slate">Pas encore assez de matchs pour mesurer la fiabilité par niveau de confiance.</div>';
  const rounds={}; done.forEach(m=>{const r=m.round||'—'; rounds[r]=(rounds[r]||0)+mp(m)});
  const roundsHtml=Object.keys(rounds).map(r=>`<span class="pill slate">${r}: ${rounds[r]} pts</span>`).join('')||'<span class="pill slate">—</span>';
  const freq={}; state.matches.filter(m=>m.userA!=null&&m.userB!=null).forEach(m=>{const k=m.userA+'-'+m.userB; freq[k]=(freq[k]||0)+1});
  const topScore=Object.keys(freq).sort((a,b)=>freq[b]-freq[a])[0]||'—';
  const myDraws=state.matches.filter(m=>m.userA!=null&&m.userA===m.userB).length;
  const realDraws=done.filter(m=>m.resA===m.resB).length;
  const obs=[];
  if(topScore!=='—')obs.push(['warn',`Ton score le plus posé est le ${topScore}, ${freq[topScore]} fois. Varie selon le match.`]);
  if(realDraws>myDraws)obs.push(['bad',`Tu sous-estimes les nuls: ${myDraws} pronostiqués pour ${realDraws} déjà tombés. Un nul juste vaut 8 points.`]); else obs.push(['good','Ton dosage de nuls est cohérent avec les matchs joués.']);
  if(winPct>=60)obs.push(['good',`Tu trouves le bon vainqueur ${winPct}% du temps, c'est ta force.`]); else obs.push(['warn',`Bon vainqueur ${winPct}% du temps. Vise d'abord l'issue, le score exact vient ensuite.`]);
  const ecart=tot-iaTot;
  const lead=ecart>0?`Tu mènes de ${ecart} pts sur le conseil IA, beau travail.`:(ecart<0?`Le conseil IA mène de ${-ecart} pts. Le suivre t'aurait rapporté plus jusqu'ici.`:`Toi et le conseil IA êtes à égalité.`);
  document.getElementById('view').innerHTML=`<section class="panel"><h2 class="sectionTitle">Performance</h2><div class="miniGrid"><div class="box"><span>Total</span><b>${tot} pts</b></div><div class="box"><span>Moyenne</span><b>${avg}/match</b></div><div class="box"><span>Bon vainqueur</span><b>${winPct}%</b></div><div class="box"><span>Scores exacts</span><b>${exact}</b></div></div><div class="pills"><span class="pill green">Bonne issue ${goodPct}%</span><span class="pill slate">${n} matchs notés</span></div></section><section class="panel"><h2 class="sectionTitle">Toi contre le conseil IA</h2><div class="miniGrid"><div class="box"><span>Tes points</span><b>${tot}</b></div><div class="box"><span>Si IA suivie</span><b>${iaTot}</b></div><div class="box"><span>Écart</span><b>${ecart>0?'+':''}${ecart}</b></div></div><div class="event ${ecart>=0?'good':'warn'}">${lead}</div>${spark}<div class="pills"><span class="pill green">Toi</span><span class="pill slate">Conseil IA</span></div></section><section class="panel"><h2 class="sectionTitle">Fiabilité du conseil IA</h2><div class="timeline">${calib}</div></section><section class="panel"><h2 class="sectionTitle">Tes pronos marquants</h2><div class="event good">Meilleur: ${best.a} ${scoreText(best.userA,best.userB)} ${best.b}, résultat ${scoreText(best.resA,best.resB)}, ${mp(best)} pts</div><div class="event ${mp(worst)>0?'warn':'bad'}">À oublier: ${worst.a} ${scoreText(worst.userA,worst.userB)} ${worst.b}, résultat ${scoreText(worst.resA,worst.resB)}, ${mp(worst)} pts</div></section><section class="panel"><h2 class="sectionTitle">Points par tour</h2><div class="pills">${roundsHtml}</div></section><section class="panel"><h2 class="sectionTitle">Lecture de ton style</h2><div class="timeline">${obs.map(o=>`<div class="event ${o[0]}">${o[1]}</div>`).join('')}</div></section>`;
}
function nav(){let items=[['accueil','Accueil','🏠'],['matchs','Matchs','⚽'],['classement','Groupes','📊'],['bonus','Bonus','🏆'],['tableau','Tableau','🗺️'],['stats','Stats','📈']];document.getElementById('nav').innerHTML=items.map(i=>`<button class="${state.view===i[0]?'active':''}" onclick="state.view='${i[0]}';save();render()"><b>${i[2]}</b>${i[1]}</button>`).join('')} function titleView(){return {accueil:'Tableau de bord',matchs:'Matchs',classement:'Classements des groupes',bonus:'Questions bonus',tableau:'Tableau final',stats:'Statistiques'}[state.view]}

const KO_R32={73:[['R','A'],['R','B']],74:[['W','E'],['3','A','B','C','D','F']],75:[['W','F'],['R','C']],76:[['W','C'],['R','F']],77:[['W','I'],['3','C','D','F','G','H']],78:[['R','E'],['R','I']],79:[['W','A'],['3','C','E','F','H','I']],80:[['W','L'],['3','E','H','I','J','K']],81:[['W','D'],['3','B','E','F','I','J']],82:[['W','G'],['3','A','E','H','I','J']],83:[['R','K'],['R','L']],84:[['W','H'],['R','J']],85:[['W','B'],['3','E','F','G','I','J']],86:[['W','J'],['R','H']],87:[['W','K'],['3','D','E','I','J','L']],88:[['R','D'],['R','G']]};
const KO_FEED={89:[74,77],90:[73,75],91:[76,78],92:[79,80],93:[83,84],94:[81,82],95:[86,88],96:[85,87],97:[89,90],98:[93,94],99:[91,92],100:[95,96],101:[97,98],102:[99,100],104:[101,102]};
const KO_ROUNDS=[['Seizièmes de finale','du 28 juin au 3 juillet',[73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88]],['Huitièmes de finale','du 4 au 7 juillet',[89,90,91,92,93,94,95,96]],['Quarts de finale','du 9 au 11 juillet',[97,98,99,100]],['Demi-finales','14 et 15 juillet',[101,102]],['Finale','19 juillet',[104]]];
const KO_RANK={W:0,R:1,'3':2};
function groupStandings(g){const ms=state.matches.filter(m=>m.group===g);const tab={};ms.forEach(m=>{[m.a,m.b].forEach(t=>{if(!tab[t])tab[t]={t:t,g:g,pts:0,gd:0,gf:0,pl:0,pos:null}})});let pro=0;ms.forEach(m=>{if(m.userA==null||m.userB==null)return;pro++;const A=tab[m.a],B=tab[m.b];A.gf+=m.userA;B.gf+=m.userB;A.gd+=m.userA-m.userB;B.gd+=m.userB-m.userA;A.pl++;B.pl++;if(m.userA>m.userB)A.pts+=3;else if(m.userA<m.userB)B.pts+=3;else{A.pts++;B.pts++}});const arr=Object.values(tab).sort((x,y)=>y.pts-x.pts||y.gd-x.gd||y.gf-x.gf||x.t.localeCompare(y.t));return {arr:arr,pro:pro,total:ms.length}}
function buildSeeds(){const S={W:{},R:{},thirdAssign:{}};let provis=0,groupsPron=0;const thirds=[];'ABCDEFGHIJKL'.split('').forEach(g=>{const st=groupStandings(g);if(st.pro<st.total)provis++;if(st.pro>0)groupsPron++;const w=st.arr[0],r=st.arr[1],t=st.arr[2];if(w){w.pos='W';S.W[g]=w}if(r){r.pos='R';S.R[g]=r}if(t){t.pos='3';thirds.push(t)}});const ranked=thirds.slice().sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.t.localeCompare(b.t));const pool=ranked.slice(0,8);const slots=[];Object.keys(KO_R32).forEach(no=>{KO_R32[no].forEach((sl,si)=>{if(sl[0]==='3')slots.push({no:+no,si:si,gs:sl.slice(1)})})});while(slots.length){slots.sort((a,b)=>a.gs.filter(g=>pool.some(t=>t.g===g)).length-b.gs.filter(g=>pool.some(t=>t.g===g)).length);const sl=slots.shift();const pick=pool.find(t=>sl.gs.includes(t.g));if(pick){S.thirdAssign[sl.no+'_'+sl.si]=pick;pool.splice(pool.indexOf(pick),1)}else{S.thirdAssign[sl.no+'_'+sl.si]=null}}S.provis=provis;S.groupsPron=groupsPron;return S}
function slotTeam(no,si,S){const sl=KO_R32[no][si];if(sl[0]==='W')return S.W[sl[1]]||null;if(sl[0]==='R')return S.R[sl[1]]||null;return S.thirdAssign[no+'_'+si]||null}
function koBetter(x,y){const rx=KO_RANK[x.pos]==null?3:KO_RANK[x.pos],ry=KO_RANK[y.pos]==null?3:KO_RANK[y.pos];if(rx!==ry)return rx<ry?x:y;if(x.pts!==y.pts)return x.pts>y.pts?x:y;if(x.gd!==y.gd)return x.gd>y.gd?x:y;if(x.gf!==y.gf)return x.gf>y.gf?x:y;return x}
function teamsOf(no,S,memo){if(KO_R32[no])return [slotTeam(no,0,S),slotTeam(no,1,S)];const f=KO_FEED[no];return [winnerSeed(f[0],S,memo),winnerSeed(f[1],S,memo)]}
function winnerSeed(no,S,memo){if(memo[no]!==undefined)return memo[no];const t=teamsOf(no,S,memo),x=t[0],y=t[1];let w;if(x&&y){const p=state.koPicks&&state.koPicks[no];if(p===x.t)w=x;else if(p===y.t)w=y;else w= koBetter(x,y)}else w=x||y||null;memo[no]=w;return w}
function koPick(no,team){if(!state.koPicks)state.koPicks={};if(state.koPicks[no]===team)delete state.koPicks[no];else state.koPicks[no]=team;save();renderTableau()}
function resetKO(){state.koPicks={};save();renderTableau()}
function renderTableau(){const S=buildSeeds();const memo={};const champ=winnerSeed(104,S,memo);const cell=(seed,no,clickable)=>{if(!seed)return `<div class="koTeam" style="opacity:.5;cursor:default"><span class="fw fwx">?</span><span class="nm">À déterminer</span></div>`;const win=winnerSeed(no,S,memo);const sel=win&&win.t===seed.t?'sel':'';const mark=sel?'<span class="mark">✓</span>':'';const clk=clickable?`onclick="koPick(${no},this.dataset.t)"`:' style="cursor:default"';return `<div class="koTeam ${sel}" data-t="${seed.t}"${clk}>${flagImg(seed.t)}<span class="nm">${seed.t}</span>${mark}</div>`};const champName=champ?champ.t:'À compléter';const bc=state.bonus&&state.bonus.champion;let consist='';if(champ&&bc){consist=champ.t===bc?`<div class="event good">Cohérent avec ton bonus, ${bc} championne.</div>`:`<div class="event warn">Ton tableau couronne ${champName}, ton bonus annonce ${bc}. À toi de trancher.</div>`}const parts=[];parts.push(`<section class="panel"><h2 class="sectionTitle">Tableau final</h2><div class="koChamp"><div class="lab">Ton champion projeté</div><b>${champ?flagImg(champ.t):''}${champName}</b></div>${consist}<div class="event slate">Projection bâtie depuis tes pronos de groupe. Touche une équipe pour la faire avancer, le tableau se recalcule jusqu'à la finale. Rappel, les points comptent double en phase finale, et tu pourras prédire les scores exacts ici une fois les équipes connues après les groupes.</div>${S.groupsPron<6?'<div class="event warn">Complète plus de pronos de groupe pour une projection plus fidèle.</div>':''}<button class="koReset" onclick="resetKO()">Réinitialiser le tableau</button></section>`);KO_ROUNDS.forEach(rd=>{const name=rd[0],date=rd[1],nos=rd[2];let inner=`<div class="koRound"><h3>${name} · ${date}</h3>`;nos.forEach(no=>{const t=teamsOf(no,S,memo),x=t[0],y=t[1];const clickable=!!(x&&y);inner+=`<div class="koTie">${cell(x,no,clickable)}${cell(y,no,clickable)}</div>`});inner+='</div>';parts.push(inner)});document.getElementById('view').innerHTML=parts.join('')}

function render(){renderStats();controls();nav(); if(state.view==='accueil')renderDashboard(); else if(state.view==='matchs')renderMatches(); else if(state.view==='classement')renderClassement(); else if(state.view==='bonus')renderBonus(); else if(state.view==='tableau')renderTableau(); else renderStatsPage(); refreshKO()}
function openAnalysis(id){let m=state.matches.find(x=>x.id===id);generateIA(m);const ua=m.userA,ub=m.userB;const hasPick=ua!=null&&ub!=null;const isDraw=hasPick&&ua===ub;const win=!hasPick?'':(ua>ub?m.a:ub>ua?m.b:'');const facteurs=(m.facteurs&&m.facteurs.length)?m.facteurs:[];const past=isPast(m);const earned=pts(m.userA,m.userB,m.resA,m.resB)||0;const iaEarned=pts(m.iaA,m.iaB,m.resA,m.resB)||0;const sameAsIA=hasPick&&ua===m.iaA&&ub===m.iaB;const ptsBlock=!hasPick?`<div class="event warn">Saisis ton pronostic pour voir ce qu'il peut rapporter.</div>`:isDraw?`<div class="timeline"><div class="event good">Score exact ${ua}-${ub} : <b>10 pts</b></div><div class="event good">Tout autre match nul : <b>8 pts</b></div><div class="event bad">Match non nul : <b>0 pt</b></div></div>`:`<div class="timeline"><div class="event good">Score exact ${ua}-${ub} : <b>10 pts</b></div><div class="event good">${win} gagne avec le même écart : <b>8 pts</b></div><div class="event warn">${win} gagne autrement : <b>au moins 5 pts</b></div><div class="event bad">Issue contraire : <b>0 pt</b></div></div>`;const compare=!hasPick?'':(sameAsIA?`<div class="event good">Ton pronostic suit le conseil IA.</div>`:`<div class="event warn">Tu t'écartes du conseil IA (${scoreText(m.iaA,m.iaB)}). Choix assumé, mais garde le bon vainqueur en priorité.</div>`);const pastBlock=`<div class="miniGrid"><div class="box"><span>Ton prono</span><b>${scoreText(m.userA,m.userB)}</b></div><div class="box"><span>Conseil IA</span><b>${scoreText(m.iaA,m.iaB)}</b></div><div class="box"><span>Résultat</span><b>${scoreText(m.resA,m.resB)}</b></div><div class="box"><span>Tes points</span><b>${earned}</b></div></div><div class="event ${earned>=8?'good':earned>=5?'warn':'bad'}">Tu as marqué <b>${earned}</b> pts. Le conseil IA proposait ${scoreText(m.iaA,m.iaB)} et aurait marqué ${iaEarned} pts.</div>`;const liveBlock=`<h2 class="sectionTitle" style="margin-top:16px">Ce que ton pronostic peut rapporter</h2>${ptsBlock}${compare}`;document.getElementById('drawer').innerHTML=`<div class="row"><h2>Analyse du match</h2><button class="btn" onclick="closeDrawer()">Fermer</button></div><div class="match"><div class="teams"><div class="team">${fteam(m.a)}</div><div><div class="scoreBig">${scoreText(m.iaA,m.iaB).replace('-',':')}</div><div class="scoreLabel">Conseil IA</div></div><div class="team right">${fteam(m.b)}</div></div><div class="pills"><span class="pill green">Confiance ${m.conf||70}%</span><span class="pill ${m.risk==='élevé'?'red':m.risk==='moyen'?'amber':'green'}">Risque ${m.risk||'moyen'}</span><span class="pill amber">Ton prono ${scoreText(m.userA,m.userB)}</span></div><div class="meter"><i style="width:${m.conf||70}%"></i></div>${facteurs.length?`<div class="pills">${facteurs.map(f=>`<span class="pill amber">${f}</span>`).join('')}</div>`:''}<p class="analysis">${m.iaNote||smartAdvice(m)}</p>${past?pastBlock:liveBlock}<h2 class="sectionTitle" style="margin-top:16px">Note perso (optionnel)</h2><textarea class="search" rows="3" placeholder="Blessure, carton, penalty, composition, météo..." oninput="state.matches.find(x=>x.id===${id}).incidents=this.value;save()">${m.incidents||''}</textarea><p class="analysis" style="font-size:12px;opacity:.6">Les infos sont récupérées automatiquement. Ouvre l'app 30 à 40 minutes avant le coup d'envoi pour la compo officielle. Ce champ sert à tes notes perso.</p></div>`;openDrawer()}
function openPast(id){let m=state.matches.find(x=>x.id===id);let p=pts(m.userA,m.userB,m.resA,m.resB); document.getElementById('drawer').innerHTML=`<div class="row"><h2>Analyse du match</h2><button class="btn" onclick="closeDrawer()">Fermer</button></div><section class="panel"><div class="meta">${fmtDate(m.date)} · Groupe ${m.group}</div><h2>${flagImg(m.a)} ${m.a} - ${m.b} ${flagImg(m.b)}</h2><div class="miniGrid"><div class="box"><span>Ton prono</span><b>${scoreText(m.userA,m.userB)}</b></div><div class="box"><span>Résultat</span><b>${scoreText(m.resA,m.resB)}</b></div><div class="box"><span>Points</span><b>${p??0}</b></div></div><p class="analysis">${smartAdvice(m)}</p>${m.incidents?`<div class="event warn"><b>Élément signalé</b><br>${m.incidents}</div>`:''}<textarea class="search" rows="4" placeholder="Ajouter ce qui a changé le match : carton rouge, penalty, blessure, rotation..." oninput="state.matches.find(x=>x.id===${id}).incidents=this.value;save()">${m.incidents||''}</textarea></section>`;openDrawer()}
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('overlay').classList.add('open')} function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open')} function optimizeDay(){let n=0; state.matches.filter(isUpcoming).forEach(m=>{generateIA(m); if((m.userA==null||m.userB==null)&&m.iaA!=null&&m.iaB!=null){m.userA=m.iaA;m.userB=m.iaB;n++}}); save();render(); toast(n?`${n} pronostic(s) remplis avec le conseil IA. Ajuste si besoin.`:'Tous tes matchs à venir sont déjà pronostiqués.')} function koInfo(ms){const diff=ms-Date.now(); if(diff<=0)return {t:'Paris fermés',c:'red'}; const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000); if(diff<=3600000)return {t:'Ferme bientôt · '+m+' min',c:'red'}; if(h<24)return {t:"Coup d'envoi dans "+h+'h'+(''+m).padStart(2,'0'),c:'amber'}; const d=Math.floor(h/24); return {t:'Dans '+d+'j '+(h%24)+'h',c:'slate'}} function koPill(m){const ms=+new Date(m.date);const i=koInfo(ms);return `<span class="pill ${i.c}" data-ko="${ms}">${i.t}</span>`} function refreshKO(){document.querySelectorAll('[data-ko]').forEach(el=>{const i=koInfo(+el.getAttribute('data-ko'));el.textContent=i.t;el.className='pill '+i.c})} function requestNotify(){if('Notification' in window)Notification.requestPermission().then(()=>toast('Rappels activés sur cet appareil.'));else toast('Notifications non prises en charge par ce navigateur.')} function resetApp(){if(confirm('Recharger les données de base ?')){localStorage.removeItem('couponIA_v10');location.reload()}}
function _norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'')}
function _pair(a,b){return [_norm(a),_norm(b)].sort().join('_')}
async function liveSync(force){ setLive('sync');
  const now=new Date(); const base=new Date(now.getFullYear(),now.getMonth(),now.getDate()); const horizon=new Date(base.getTime()+3*864e5);
  const days=[...new Set(state.matches.filter(m=>{const d=new Date(m.date);return d>=base&&d<=horizon}).map(m=>m.date.slice(0,10)))];
  if(!days.length){setLive('off');return} let changed=false,okAny=false;
  for(const day of days){ try{
    const r=await fetch('/api/predictions?date='+day+(force?'&refresh=1':'')); if(!r.ok)continue; const data=await r.json(); if(!data.ok||!data.matches)continue; okAny=true;
    const map={}; data.matches.forEach(x=>{map[_pair(x.equipeA,x.equipeB)]=x});
    state.matches.forEach(m=>{ const x=map[_pair(m.a,m.b)]; if(!x)return;
      if(x.scoreA!=null&&x.scoreB!=null){m.iaA=x.scoreA;m.iaB=x.scoreB}
      m.conf=x.confiance==='haute'?80:x.confiance==='moyenne'?66:56;
      m.risk=x.confiance==='haute'?'faible':x.confiance==='moyenne'?'moyen':'élevé';
      if(x.analyse)m.iaNote=x.analyse; if(x.facteurs&&x.facteurs.length)m.facteurs=x.facteurs; if(x.resultatA!=null&&x.resultatB!=null&&m.resA==null&&m.resB==null){m.resA=x.resultatA;m.resB=x.resultatB} changed=true; });
  }catch(e){} }
  if(changed){save(); const ae=document.activeElement; if(!ae||!/^(INPUT|TEXTAREA)$/.test(ae.tagName))render()} const d=new Date(); setLive(okAny?'on':'off',(''+d.getHours()).padStart(2,'0')+'h'+(''+d.getMinutes()).padStart(2,'0')); if(changed&&okAny)toast('Analyse IA mise à jour en direct.')
}
render(); setInterval(refreshKO,30000);
(function(){const lb=document.createElement('div');lb.id='liveBadge';lb.innerHTML='<span class="dot"></span><span id="lbText">Analyse intégrée</span><button id="lbRefresh" title="Actualiser">&#x21bb;</button>';document.body.appendChild(lb);document.getElementById('lbRefresh').onclick=function(){liveSync(true)};})();
function setLive(s,t){const b=document.getElementById('liveBadge');if(!b)return;const tx=document.getElementById('lbText');b.classList.remove('sync','on');if(s==='sync'){b.classList.add('sync');tx.textContent='Mise à jour...'}else if(s==='on'){b.classList.add('on');tx.textContent='Live '+t}else{tx.textContent='Analyse intégrée'}}
liveSync(); setInterval(function(){liveSync()},600000);
</script>
